<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Curated Vintage</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center;">

    <!-- Overlay -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.7); z-index: 1;"></div>

    <div class="container" style="position: relative; z-index: 2; text-align: center; color: #fff; max-width: 800px;">
        <h3 style="font-family: var(--font-body); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; color: var(--secondary-color);">Prepare Your Wardrobe</h3>
        <h1 style="font-size: 64px; margin-bottom: 30px; font-family: var(--font-heading);">The Fall Archive Drops In</h1>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 50px;">
            <div style="text-align: center;">
                <div style="font-size: 48px; font-family: var(--font-heading); font-weight: 700;">14</div>
                <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Days</div>
            </div>
            <div style="font-size: 48px; font-family: var(--font-heading); font-weight: 700;">:</div>
            <div style="text-align: center;">
                <div style="font-size: 48px; font-family: var(--font-heading); font-weight: 700;">08</div>
                <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Hours</div>
            </div>
            <div style="font-size: 48px; font-family: var(--font-heading); font-weight: 700;">:</div>
            <div style="text-align: center;">
                <div style="font-size: 48px; font-family: var(--font-heading); font-weight: 700;">45</div>
                <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Mins</div>
            </div>
        </div>

        <p style="margin-bottom: 30px; font-size: 18px; color: rgba(255,255,255,0.8);">Be the first to know when our most exclusive collection yet goes live.</p>
        
        <form style="display: flex; max-width: 500px; margin: 0 auto; gap: 10px;">
            <input type="email" placeholder="Enter your email address" class="form-control" style="flex-grow: 1; background-color: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.3);" required>
            <button type="submit" class="btn btn-primary" style="background-color: var(--secondary-color); color: #000;">Notify Me</button>
        </form>
    </div>

</body>
</html>
