<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Curated Vintage Store</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <!-- AUTH WRAPPER -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-logo">
                <span>C</span>urated.
            </h2>
            
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Create an account to save your favorite archive pieces.</p>
            
            <form action="dashboard.html">
                <div class="form-group">
                    <label class="form-label text-left">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label text-left">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label text-left">Password</label>
                    <input type="password" class="form-control" id="reg-password" placeholder="Create a password" required>
                    <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('reg-password')"></i>
                </div>

                <div class="auth-options" style="justify-content: flex-start; margin-bottom: 20px;">
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 13px; color: var(--text-secondary);">
                        <input type="checkbox" required style="accent-color: var(--primary-color); margin-top: 3px;"> 
                        <span>I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a>.</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            
            <div class="divider">
                <span style="background-color: var(--surface-color); padding: 0 10px; color: var(--text-secondary); font-size: 12px; position: relative; z-index: 1;">Or sign up with</span>
            </div>
            
            <div class="social-login">
                <button class="btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 20px;">
                    Sign up with Google
                </button>
                <button class="btn">
                    <i class="fa-brands fa-apple" style="font-size: 20px;"></i>
                    Sign up with Apple
                </button>
            </div>
            
            <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-secondary);">
                Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Log in</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
